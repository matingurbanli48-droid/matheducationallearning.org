<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matins Awesome Website</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; min-height: 100vh; }
    canvas { position: fixed; top: 0; left: 0; z-index: 0; width: 100%; height: 100%; }
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      min-height: 100vh;
    }
    .title {
      font-family: 'Courier New', monospace;
      font-size: 2rem;
      color: #00ff41;
      text-shadow: 0 0 10px #00ff41, 0 0 20px #00ff41;
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
    }
    .proxy-bar {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 800px;
      margin-bottom: 2rem;
    }
    .proxy-bar input {
      flex: 1;
      padding: 10px 16px;
      background: rgba(0,255,65,0.1);
      border: 1px solid #00ff41;
      border-radius: 6px;
      color: #00ff41;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      outline: none;
    }
    .proxy-bar input::placeholder { color: rgba(0,255,65,0.4); }
    .proxy-bar button {
      padding: 10px 20px;
      background: #00ff41;
      border: none;
      border-radius: 6px;
      color: #000;
      font-family: 'Courier New', monospace;
      font-weight: 700;
      cursor: pointer;
    }
    .proxy-bar button:hover { background: #00cc33; }
    .games-section {
      width: 100%;
      max-width: 800px;
    }
    .games-title {
      color: #00ff41;
      font-family: 'Courier New', monospace;
      font-size: 1.5rem;
      text-align: center;
      margin-bottom: 1rem;
      text-shadow: 0 0 10px #00ff41;
    }
    .games-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
    }
    .game-item {
      text-align: center;
    }
    .game-item p {
      color: #00ff41;
      font-family: 'Courier New', monospace;
      margin-bottom: 0.5rem;
    }
    .game-item iframe {
      border: 1px solid #00ff41;
      border-radius: 6px;
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>
  <div class="content">
    <div class="title">matins awesome website</div>
    <div class="proxy-bar">
      <input id="searchInput" type="text" placeholder="Search Google or enter a URL..." />
      <button onclick="navigate()">GO</button>
    </div>
    <div class="games-section">
      <div class="games-title">Games</div>
      <div class="games-grid">
        <div class="game-item">
          <p>2048</p>
          <iframe src="https://play2048.co/" width="350" height="500" frameborder="0"></iframe>
        </div>
        <div class="game-item">
          <p>Snake</p>
          <iframe src="https://playsnake.org/" width="350" height="500" frameborder="0"></iframe>
        </div>
        <div class="game-item">
          <p>Tetris</p>
          <iframe src="https://tetris.com/play-tetris" width="350" height="500" frameborder="0"></iframe>
        </div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    const fontSize = 14;
    let cols = Math.floor(canvas.width / fontSize);
    let drops = Array(cols).fill(1);
    function draw() {
      ctx.fillStyle = 'rgba(0,0,0,0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#00ff41';
      ctx.font = fontSize + 'px Courier New';
      cols = Math.floor(canvas.width / fontSize);
      if (drops.length !== cols) drops = Array(cols).fill(1);
      for (let i = 0; i < drops.length; i++) {
        const ch = Math.random() < 0.5 ? '0' : '1';
        ctx.fillText(ch, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }
    setInterval(draw, 33);

    function navigate() {
      const val = document.getElementById('searchInput').value.trim();
      if (!val) return;
      let url;
      if (val.startsWith('http://') || val.startsWith('https://')) {
        url = val;
      } else if (val.includes('.') && !val.includes(' ')) {
        url = 'https://' + val;
      } else {
        url = 'https://www.google.com/search?q=' + encodeURIComponent(val);
      }
      window.open(url, '_blank');
    }

    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') navigate();
    });
  </script>
</body>
</html>
